<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Mohini 🎉</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      display: flex; justify-content: center; align-items: center; height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center; overflow: hidden;
    }

    .card {
      background: white; padding: 20px; border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 90%; z-index: 10; position: relative;
    }

    h1 { font-size: 2rem; color: #ff4d6d; }
    p { margin-top: 10px; font-size: 1.1rem; color: #333; min-height: 48px; }

    button {
      margin-top: 15px; padding: 10px 20px; border: none; border-radius: 10px;
      background: #ff4d6d; color: white; font-size: 1rem; cursor: pointer;
    }

    canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 0; }

    .balloon {
      position: absolute; bottom: -100px; width: 40px; height: 55px;
      border-radius: 50%; opacity: 0.8; animation: floatUp linear infinite; z-index: 0;
      pointer-events: none;
    }

    .balloon::after {
      content: ""; position: absolute; width: 2px; height: 30px;
      background: #555; top: 55px; left: 50%; transform: translateX(-50%);
    }

    @keyframes floatUp { from { transform: translateY(0); } to { transform: translateY(-120vh); } }

    .heart {
      position: fixed; top: -20px; color: red; font-size: 20px;
      animation: fall linear forwards; z-index: 0;
      pointer-events: none;
    }

    @keyframes fall { to { transform: translateY(110vh); opacity: 0; } }

    .cake { margin-top: 20px; font-size: 50px; cursor: pointer; transition: transform 0.3s; }
    .cake.cut { transform: scale(1.2) rotate(10deg); }

    .hidden { display: none; }

    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <audio id="music" autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg">
  </audio>

  <div class="card">
    <h1>🎂 Happy Birthday Mohini 🎉</h1>
    <p id="typing"></p>

    <button id="surpriseBtn">🎁 Open Surprise</button>

    <div id="surprise" class="hidden">
      <div class="cake" id="cake">🎂</div>
      <p id="cakeMsg"></p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let confetti = [];

    function createConfetti() {
      for (let i = 0; i < 150; i++) {
        confetti.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 6 + 2,
          d: Math.random() * 50,
          color: `hsl(${Math.random() * 360}, 100%, 50%)`
        });
      }
    }

    function drawConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confetti.forEach((c, i) => {
        ctx.beginPath();
        ctx.fillStyle = c.color;
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fill();
      });
      updateConfetti();
    }

    function updateConfetti() {
      confetti.forEach((c, i) => {
        c.y += Math.cos(c.d) + 1 + c.r / 2;
        c.x += Math.sin(c.d);
        if (c.y > canvas.height) {
          confetti[i] = { ...c, y: -10, x: Math.random() * canvas.width };
        }
      });
    }

    function startConfetti() {
      createConfetti();
      setInterval(drawConfetti, 20);
    }
    startConfetti();

    const text = "Wishing you endless happiness, success, and smiles. You are truly special! 💖";
    let index = 0;
    function typeEffect() {
      if (index < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeEffect, 40);
      }
    }
    typeEffect();

    function createBalloon() {
      const balloon = document.createElement("div");
      balloon.classList.add("balloon");
      balloon.style.left = Math.random() * 100 + "vw";
      balloon.style.background = `hsl(${Math.random()*360},100%,60%)`;
      balloon.style.animationDuration = (Math.random() * 3 + 4) + "s";
      document.body.appendChild(balloon);
      setTimeout(() => balloon.remove(), 7000);
    }
    setInterval(createBalloon, 500);

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 5000);
    }
    setInterval(createHeart, 300);

    // FIXED BUTTON
    document.getElementById("surpriseBtn").addEventListener("click", () => {
      document.getElementById("surprise").classList.remove("hidden");
    });

    document.getElementById("cake").addEventListener("click", () => {
      document.getElementById("cake").classList.add("cut");
      document.getElementById("cakeMsg").innerText = "🎉 Cake cut! Enjoy your special day Mohini! 💖";
    });

    document.body.addEventListener('click', () => {
      document.getElementById('music').play();
    });

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
